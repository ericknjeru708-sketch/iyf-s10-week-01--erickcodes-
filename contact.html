<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Erick Njeru</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; line-height: 1.6; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 0; }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 2.5rem; }
        nav a { color: white; text-decoration: none; font-weight: 500; }
        nav a:hover, nav a.active { color: #00ff9d; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        form { max-width: 600px; }
        label { display: block; margin: 10px 0 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #00ff9d; color: #1a1a2e; padding: 12px 30px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1>Contact Me</h1>
        
        <form action="#" method="post">
            <fieldset>
                <legend>Personal Information</legend>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Optional">
            </fieldset>

            <fieldset>
                <legend>Message Details</legend>
                <label for="subject">Subject:</label>
                <select id="subject" name="subject" required>
                    <option value="">Choose a subject</option>
                    <option value="inquiry">General Inquiry</option>
                    <option value="feedback">Feedback</option>
                    <option value="collaboration">Collaboration</option>
                </select>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="6" required minlength="50" placeholder="Write your message here (at least 50 characters)"></textarea>
            </fieldset>

            <label>
                <input type="checkbox" name="newsletter"> Subscribe to newsletter
            </label>

            <button type="submit">Send Message</button>
        </form>

        <p style="margin-top: 2rem;">
            Or email me directly: <a href="mailto:ericknjeru708@example.com">ericknjeru708@example.com</a>
        </p>
    </main>
</body>
</html>
